---
- name: Create root SSH keys for Nix remote builds
  hosts: x86
  gather_facts: false
  become: true
  vars:
    builder_key_path: /root/.ssh/nix-builder_ed25519
  tasks:
    - name: Ensure root SSH directory exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Check whether builder key already exists
      ansible.builtin.stat:
        path: "{{ builder_key_path }}"
      register: builder_key

    - name: Generate builder key
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -N "" -C "nix-builder@{{ inventory_hostname }}" -f "{{ builder_key_path }}"
      when: not builder_key.stat.exists
      changed_when: true

    - name: Read builder public key
      ansible.builtin.slurp:
        src: "{{ builder_key_path }}.pub"
      register: builder_public_key

    - name: Show hosts.nix entry
      ansible.builtin.debug:
        msg: 'Add to hosts.nix under {{ inventory_hostname }}: builderPubKey = "{{ builder_public_key.content | b64decode | trim }}";'
